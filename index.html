<style>
:root{
  color-scheme: only light;
  --bg-1:#232637;
  --bg-2:#171a27;
  --hud:#08111dcc;
  --hud-border:#7cb0ff55;
  --hud-text:#d9ecff;
  --hud-soft:#9cc4f4;
  --accent:#5ea6ff;
  --accent-2:#2f73ff;
  --prompt:#101a29ef;
  --shadow:0 20px 40px rgba(0,0,0,.24);
  --safe-top:max(12px, env(safe-area-inset-top));
  --safe-left:max(12px, env(safe-area-inset-left));
  --safe-right:max(12px, env(safe-area-inset-right));
  --safe-bottom:max(14px, env(safe-area-inset-bottom));
  --ui-font:"Consolas","D2Coding","Malgun Gothic","Apple SD Gothic Neo",monospace;
}

*{box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:
    radial-gradient(circle at top, #3d425f 0%, #232637 44%, #171a27 100%);
  font-family:var(--ui-font);
  touch-action:none;
}

body{
  color:var(--hud-text);
}

#app{
  position:relative;
  width:100vw;
  width:100dvw;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

#gameCanvas{
  display:block;
  width:100%;
  height:100%;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.panel{
  background:var(--hud);
  border:1px solid var(--hud-border);
  border-radius:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(8px);
}

.hud-title{
  font-size:12px;
  color:#7db7ff;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:8px;
}

.kbd{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:54px;
  padding:2px 8px;
  border-radius:8px;
  background:#173050;
  border:1px solid #5b92cf;
  color:#e5f2ff;
  font-size:11px;
}

#locationBadge{
  position:absolute;
  top:calc(var(--safe-top) + 10px);
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  font-size:13px;
  color:#eff8ff;
  white-space:nowrap;
}

#floorTabs{
  position:absolute;
  top:calc(var(--safe-top) + 62px);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  pointer-events:auto;
}

.floor-tab{
  border:1px solid rgba(124,176,255,.38);
  border-radius:999px;
  padding:8px 14px;
  background:rgba(8,17,29,.82);
  color:#d7ebff;
  font-family:inherit;
  font-size:12px;
  cursor:pointer;
  box-shadow:var(--shadow);
}

.floor-tab.active{
  background:linear-gradient(180deg, rgba(105,167,255,.96) 0%, rgba(44,96,187,.96) 100%);
  border-color:rgba(206,228,255,.6);
  color:#ffffff;
}

#prompt{
  position:absolute;
  left:50%;
  bottom:calc(var(--safe-bottom) + 18px);
  transform:translateX(-50%);
  display:none;
  max-width:min(82vw, 620px);
  padding:10px 16px;
  font-size:13px;
  color:#eef6ff;
  background:var(--prompt);
  border:1px solid rgba(124,176,255,.4);
  border-radius:999px;
  box-shadow:var(--shadow);
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#dialoguePanel{
  position:absolute;
  left:50%;
  bottom:calc(var(--safe-bottom) + 24px);
  transform:translateX(-50%);
  width:min(760px, calc(100vw - 24px - env(safe-area-inset-left) - env(safe-area-inset-right)));
  padding:18px 18px 16px;
  color:#1d2a3e;
  background:linear-gradient(180deg, #fffdf7 0%, #f3ebd9 100%);
  border:2px solid #4f6b8c;
  border-radius:22px;
  box-shadow:0 28px 60px rgba(0,0,0,.32);
  pointer-events:auto;
}

#dialoguePanel[hidden]{
  display:none;
}

.dialogue-head{
  display:flex;
  align-items:center;
  gap:12px;
}

#dialogueAvatar{
  width:48px;
  height:48px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  background:#dbe8fb;
  border:1px solid #7fa8da;
  flex:0 0 auto;
}

#dialogueMeta{
  flex:1;
  min-width:0;
}

#dialogueName{
  display:block;
  font-size:18px;
  color:#18304d;
}

#dialogueClass{
  display:block;
  margin-top:2px;
  font-size:12px;
  color:#59779a;
}

#dialogueClose{
  border:0;
  border-radius:999px;
  padding:10px 14px;
  font-family:inherit;
  font-size:12px;
  color:#eff8ff;
  background:#2f5ea4;
  cursor:pointer;
}

#dialogueText{
  margin:14px 4px 0;
  font-size:15px;
  line-height:1.7;
  color:#2b3c57;
  white-space:pre-wrap;
}

#dialogueHint{
  margin-top:12px;
  font-size:11px;
  color:#6b83a0;
  text-align:right;
}

#touchControls{
  position:absolute;
  inset:0;
  pointer-events:none;
}

#joystick{
  position:absolute;
  left:calc(var(--safe-left) + 16px);
  bottom:calc(var(--safe-bottom) + 92px);
  width:clamp(92px, 20vw, 132px);
  aspect-ratio:1;
  display:none;
  pointer-events:auto;
}

#joystickBase,
#joystickStick{
  position:absolute;
  border-radius:50%;
}

#joystickBase{
  inset:0;
  background:rgba(126,173,255,.18);
  border:2px solid rgba(126,173,255,.44);
}

#joystickStick{
  width:42%;
  height:42%;
  left:29%;
  top:29%;
  background:rgba(84,148,255,.72);
  border:2px solid rgba(226,239,255,.78);
}

#interactButton{
  position:absolute;
  right:calc(var(--safe-right) + 18px);
  bottom:calc(var(--safe-bottom) + 98px);
  width:clamp(78px, 18vw, 100px);
  aspect-ratio:1;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:4px;
  border:0;
  border-radius:50%;
  background:linear-gradient(180deg, rgba(102,165,255,.95) 0%, rgba(39,93,182,.95) 100%);
  color:#f4f9ff;
  font-family:inherit;
  box-shadow:var(--shadow);
  pointer-events:auto;
  cursor:pointer;
}

#interactButton span{
  font-size:16px;
  font-weight:700;
}

#interactButton small{
  font-size:11px;
  opacity:.86;
}

.touch-ui #joystick,
.touch-ui #interactButton{
  display:flex;
}

.dialogue-open #joystick,
.dialogue-open #interactButton{
  display:none !important;
}

.dialogue-open #floorTabs{
  pointer-events:none;
  opacity:.45;
}

@media (max-width:860px){
  #locationBadge{
    font-size:12px;
    padding:9px 14px;
    max-width:48vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  #floorTabs{
    top:calc(var(--safe-top) + 54px);
  }

  #dialogueText{
    font-size:14px;
  }
}

@media (max-width:640px){
  .kbd{
    min-width:48px;
    padding:2px 7px;
  }

  #floorTabs{
    top:calc(var(--safe-top) + 50px);
    gap:6px;
  }

  .floor-tab{
    padding:7px 10px;
    font-size:11px;
  }

  #prompt{
    bottom:calc(var(--safe-bottom) + 10px);
    font-size:12px;
    padding:9px 12px;
  }

  #dialoguePanel{
    width:calc(100vw - 14px - env(safe-area-inset-left) - env(safe-area-inset-right));
    bottom:calc(var(--safe-bottom) + 8px);
    padding:14px;
    border-radius:18px;
  }

  .dialogue-head{
    gap:10px;
  }

  #dialogueAvatar{
    width:42px;
    height:42px;
    font-size:21px;
  }

  #dialogueName{
    font-size:16px;
  }

  #dialogueClose{
    padding:9px 11px;
    font-size:11px;
  }
}
</style>
</head>
<body>
<div id="app">

    <div id="touchControls">
      <div id="joystick">
        <div id="joystickBase"></div>
        <div id="joystickStick"></div>
      </div>
      <button id="interactButton" type="button">

        <small>E</small>

</div>

function getStudentMeta(student, roomData){
  const matched = String(student.name).match(/^(\d+)번\s*(.+)$/);
  const number = matched ? matched[1] : "";
  const shortName = matched ? matched[2].trim() : student.name;
  const role = STUDENT_ROLE_INFO[student.id] || "";
  const gender = STUDENT_GENDER_INFO[student.id] || "";
  const baseLine = roomData.year + "학년 " + roomData.section + "반" + (number ? " " + number + "번" : "");
  const detailLine = role ? baseLine + " · " + role : baseLine;
  return { number, shortName, detailLine, role, gender };
}

function getStudentHairColor(studentId, fallback){
  return STUDENT_HAIR_INFO[studentId] || fallback;
}

function getRoomOrderForFloor(data, floor){
  return data.roomOrder.filter((code) => data.classrooms[code].year === floor);
}

function buildWorld(data, floor){
  const buildingX = 72;
  const buildingY = 60;
  const roomOrder = getRoomOrderForFloor(data, floor);
  const roomCount = roomOrder.length;
  const innerWidth = roomCount * ROOM_W;
  const buildingWidth = innerWidth + WALL * 2;
  const buildingHeight = WALL + ROOM_H + WALL + CORRIDOR_H + WALL;
  const worldWidth = buildingX * 2 + buildingWidth;
  const worldHeight = buildingY * 2 + buildingHeight;
  const corridorY = buildingY + WALL + ROOM_H + WALL;
  const corridorRect = {
    x: buildingX + WALL,
    y: corridorY,
    w: innerWidth,
    h: CORRIDOR_H
  };

  const result = {
    width: worldWidth,
    height: worldHeight,
    building: { x: buildingX, y: buildingY, w: buildingWidth, h: buildingHeight },
    corridor: corridorRect,
    roomCount,
    floor,
    rooms: [],
    props: [],
    students: [],
    obstacles: [],
    spawn: {
      x: buildingX + Math.min(ROOM_W * 0.65, innerWidth - 120),
      y: corridorY + CORRIDOR_H * 0.56
    }
  };

  result.obstacles.push(
    { x: buildingX, y: buildingY, w: buildingWidth, h: WALL },
    { x: buildingX, y: buildingY, w: WALL, h: buildingHeight },
    { x: buildingX + buildingWidth - WALL, y: buildingY, w: WALL, h: buildingHeight },
    { x: buildingX, y: buildingY + buildingHeight - WALL, w: buildingWidth, h: WALL }
  );

  for(let i = 1; i < roomCount; i += 1){
    result.obstacles.push({
      x: buildingX + WALL + i * ROOM_W - WALL * 0.5,
      y: buildingY + WALL,
      w: WALL,
      h: ROOM_H
    });
  }

  roomOrder.forEach((code, index) => {
    const roomData = data.classrooms[code];
    const x = buildingX + WALL + index * ROOM_W;
    const y = buildingY + WALL;
    const doorX = x + ROOM_W * 0.5 - DOOR_W * 0.5;
    const room = {
      code,
      name: roomData.name,
      year: roomData.year,
      section: roomData.section,
      theme: roomData.theme,
      x,
      y,
      w: ROOM_W,
      h: ROOM_H,
      interior: { x: x + 14, y: y + 14, w: ROOM_W - 28, h: ROOM_H - 28 },
      door: { x: doorX, y: corridorY - WALL, w: DOOR_W, h: WALL }
    };

    result.rooms.push(room);

    result.obstacles.push(
      { x, y: corridorY - WALL, w: doorX - x, h: WALL },
      { x: doorX + DOOR_W, y: corridorY - WALL, w: x + ROOM_W - (doorX + DOOR_W), h: WALL }
    );

    createClassroomProps(room, index, result.props, result.obstacles);

    roomData.students.forEach((student, studentIndex) => {
      const meta = getStudentMeta(student, roomData);
      const basePalette = npcPaletteFor(student.id, studentIndex);
      const palette = {
        ...basePalette,
        gender: meta.gender,
        hair: getStudentHairColor(student.id, basePalette.hair)
      };
      result.students.push({
        id: student.id,
        roomCode: code,
        roomName: room.name,
        name: student.name,
        shortName: meta.shortName,
        number: meta.number,
        detailLine: meta.detailLine,
        role: meta.role,
        gender: meta.gender,
        avatar: student.avatar,
        dialogues: student.dialogues,
        x: x + 12 + student.gx * 28,
        y: y + 12 + student.gy * 28,
        sortY: y + 12 + student.gy * 28,
        dir: "down",
        bobOffset: (studentIndex + index) * 0.6,
        palette
      });
    });
  });

  createCorridorProps(result);
  return result;
}

function createClassroomProps(room, index, props, obstacles){
  props.push(
    { type: "blackboard", x: room.x + 28, y: room.y + 20, w: 118, h: 40, sortY: room.y + 58 },
    { type: "teacherDesk", x: room.x + room.w - 132, y: room.y + 90, w: 88, h: 38, sortY: room.y + 128 },
    { type: "bookshelf", x: room.x + 18, y: room.y + 92, w: 40, h: 108, sortY: room.y + 200 }
  );

  obstacles.push(
    { x: room.x + room.w - 126, y: room.y + 106, w: 76, h: 18 },
    { x: room.x + 20, y: room.y + 102, w: 36, h: 86 }
  );

  const windowXs = index % 2 === 0 ? [room.x + room.w - 166, room.x + room.w - 94] : [room.x + room.w - 128];
  windowXs.forEach((windowX, windowIndex) => {
    props.push({
      type: "window",
      x: windowX,
      y: room.y + 18 + windowIndex * 2,
      w: 58,
      h: 46,
      sortY: room.y + 64
    });
  });

  const deskCentersX = [room.x + 98, room.x + 190, room.x + 282];
  const deskCentersY = [room.y + 126, room.y + 200];
  deskCentersY.forEach((centerY, rowIndex) => {
    deskCentersX.forEach((centerX, colIndex) => {
      const deskX = centerX - 26;
      const deskY = centerY - 22;
      props.push(
        { type: "desk", x: deskX, y: deskY, w: 52, h: 34, sortY: deskY + 32 },

    });

function createBaseWorld(worldData){
  const off = document.createElement("canvas");
  off.width = worldData.width;
  off.height = worldData.height;
  const g = off.getContext("2d");
  g.imageSmoothingEnabled = false;

  const { building, corridor, rooms } = worldData;

  g.fillStyle = COLORS.outsideA;
  g.fillRect(0, 0, off.width, off.height);

  const outsideGrad = g.createLinearGradient(0, 0, 0, off.height);
  outsideGrad.addColorStop(0, COLORS.outsideA);
  outsideGrad.addColorStop(1, COLORS.outsideB);
  g.fillStyle = outsideGrad;
  g.fillRect(0, 0, off.width, off.height);

  g.fillStyle = COLORS.shadow;
  g.fillRect(building.x + 10, building.y + 18, building.w + 12, building.h + 10);

  g.fillStyle = COLORS.wallLight;
  g.fillRect(building.x, building.y, building.w, building.h);

  fillTiledFloor(g, corridor.x, corridor.y, corridor.w, corridor.h, COLORS.corridorA, COLORS.corridorB, COLORS.corridorLine);
  rooms.forEach((room) => {
    fillTiledFloor(g, room.x, room.y, room.w, room.h, COLORS.roomFloorA, COLORS.roomFloorB, COLORS.roomFloorLine);
  });

  g.fillStyle = COLORS.wallLight;
  g.fillRect(building.x, building.y, building.w, WALL);
  g.fillRect(building.x, building.y, WALL, building.h);
  g.fillRect(building.x + building.w - WALL, building.y, WALL, building.h);
  g.fillRect(building.x, building.y + building.h - WALL, building.w, WALL);

  g.fillStyle = COLORS.wallTrim;
  g.fillRect(building.x, building.y, building.w, 4);
  g.fillRect(building.x, building.y + building.h - WALL, building.w, 4);

  const separatorY = corridor.y - WALL;
  rooms.forEach((room) => {
    g.fillStyle = COLORS.wallLight;
    g.fillRect(room.x, separatorY, room.w, WALL);
    g.fillStyle = COLORS.wallDark;
    g.fillRect(room.x, separatorY + WALL - 4, room.w, 4);

    g.fillStyle = COLORS.door;
    g.fillRect(room.door.x, separatorY + 2, room.door.w, WALL - 2);
    g.fillStyle = COLORS.doorShadow;
    g.fillRect(room.door.x, separatorY + WALL - 6, room.door.w, 6);

    g.fillStyle = COLORS.wallTrim;
    g.fillRect(room.x, room.y, room.w, 4);

    g.strokeStyle = COLORS.wallDark;
    g.lineWidth = 2;
    g.strokeRect(room.x + 1, room.y + 1, room.w - 2, room.h - 2);

    drawRoomLabel(g, room);
  });

  for(let i = 1; i < rooms.length; i += 1){
    const x = building.x + WALL + i * ROOM_W;
    g.fillStyle = COLORS.wallLight;
    g.fillRect(x - WALL * 0.5, building.y + WALL, WALL, ROOM_H);
    g.fillStyle = COLORS.wallDark;
    g.fillRect(x - WALL * 0.5, building.y + WALL, 4, ROOM_H);
  }

  return off;
}

function fillTiledFloor(g, x, y, w, h, colorA, colorB, lineColor){
  for(let tx = x; tx < x + w; tx += TILE){
    for(let ty = y; ty < y + h; ty += TILE){
      const alt = ((tx - x) / TILE + (ty - y) / TILE) % 2 === 0;
      g.fillStyle = alt ? colorA : colorB;
      g.fillRect(tx, ty, TILE, TILE);
      g.strokeStyle = lineColor;
      g.lineWidth = 0.6;
      g.strokeRect(tx + 0.5, ty + 0.5, TILE, TILE);
    }
  }
}

function drawRoomLabel(g, room){
  const labelY = room.door.y + 28;
  g.fillStyle = "#18304d";
  g.fillRect(room.x + room.w * 0.5 - 58, labelY, 116, 22);
  g.fillStyle = yearColor(room.year);
  g.fillRect(room.x + room.w * 0.5 - 54, labelY + 4, 108, 14);
  g.fillStyle = "#17324a";
  g.font = "bold 12px Consolas, Malgun Gothic, sans-serif";
  g.textAlign = "center";
  g.textBaseline = "middle";
  g.fillText(room.name, room.x + room.w * 0.5, labelY + 11);
}

function bindInput(){
  const handledCodes = new Set(["Digit1","Digit2","Digit3","KeyW","KeyA","KeyS","KeyD","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyE","Escape"]);

  window.addEventListener("keydown", (event) => {
    if(handledCodes.has(event.code)){
      event.preventDefault();
    }
    state.keys[event.code] = true;
    if(event.code === "KeyE" && !event.repeat){
      state.interactionQueued = true;
    }
    if(event.code === "Escape" && !event.repeat){
      state.closeQueued = true;
    }
    if((event.code === "Digit1" || event.code === "Digit2" || event.code === "Digit3") && !event.repeat){
      switchFloor(Number(event.code.replace("Digit", "")));
    }
  });

  window.addEventListener("keyup", (event) => {
    state.keys[event.code] = false;
  });

  window.addEventListener("blur", () => {
    state.keys = Object.create(null);
    resetJoystick();
  });

  window.addEventListener("resize", resizeCanvas);
  dialogueClose.addEventListener("click", closeDialogue);
  interactButton.addEventListener("click", () => {
    state.interactionQueued = true;
  });
  floorTabs.forEach((button) => {
    button.addEventListener("click", () => {
      switchFloor(Number(button.dataset.floor));
    });
  });

  joystickEl.addEventListener("pointerdown", (event) => {
    if(!state.isTouchUI){
      return;
    }
    event.preventDefault();
    state.joystick.active = true;
    state.joystick.pointerId = event.pointerId;
    state.joystick.radius = joystickEl.getBoundingClientRect().width * 0.34;
    joystickEl.setPointerCapture(event.pointerId);
    updateJoystickFromEvent(event);
  });

  joystickEl.addEventListener("pointermove", (event) => {
    if(!state.joystick.active || state.joystick.pointerId !== event.pointerId){
      return;
    }
    event.preventDefault();
    updateJoystickFromEvent(event);
  });

  joystickEl.addEventListener("pointerup", releaseJoystick);
  joystickEl.addEventListener("pointercancel", releaseJoystick);
}

function releaseJoystick(event){
  if(state.joystick.pointerId !== event.pointerId){
    return;
  }
  resetJoystick();
}

function updateJoystickFromEvent(event){
  const rect = joystickEl.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  const dx = event.clientX - centerX;
  const dy = event.clientY - centerY;
  const distance = Math.hypot(dx, dy);
  const radius = state.joystick.radius || rect.width * 0.34;
  const clamped = distance > radius && distance > 0
    ? { x: dx / distance * radius, y: dy / distance * radius }
    : { x: dx, y: dy };

  state.joystick.x = clamped.x / radius;
  state.joystick.y = clamped.y / radius;

  const stickLeft = 29 + (clamped.x / rect.width) * 100;
  const stickTop = 29 + (clamped.y / rect.height) * 100;
  joystickStick.style.left = stickLeft + "%";
  joystickStick.style.top = stickTop + "%";
}

function resetJoystick(){
  state.joystick.active = false;
  state.joystick.pointerId = null;
  state.joystick.x = 0;
  state.joystick.y = 0;
  joystickStick.style.left = "29%";
  joystickStick.style.top = "29%";
}

function resizeCanvas(){
  state.viewport.width = window.innerWidth;
  state.viewport.height = window.innerHeight;
  state.viewport.dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(state.viewport.width * state.viewport.dpr);
  canvas.height = Math.round(state.viewport.height * state.viewport.dpr);
  canvas.style.width = state.viewport.width + "px";
  canvas.style.height = state.viewport.height + "px";
  ctx.setTransform(state.viewport.dpr, 0, 0, state.viewport.dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
  updateCamera(true);
}

function loop(timestamp){
  if(!loop.last){
    loop.last = timestamp;
  }
  const dt = Math.min((timestamp - loop.last) / 1000, 0.05);
  loop.last = timestamp;
  state.time += dt;

  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  if(state.closeQueued){
    closeDialogue();
    state.closeQueued = false;
  }

  if(!state.dialogue){
    movePlayer(dt);
  } else {
    state.player.moving = false;
  }

  state.currentRoom = getCurrentRoom();
  state.nearStudent = findNearestStudent();

  if(state.interactionQueued){
    handleInteraction();
    state.interactionQueued = false;
  }

  updateFacing();
  updateCamera(false);
  updateHud();
}

function movePlayer(dt){
  let dx = 0;
  let dy = 0;

  if(state.keys.KeyA || state.keys.ArrowLeft){
    dx -= 1;
  }
  if(state.keys.KeyD || state.keys.ArrowRight){
    dx += 1;
  }
  if(state.keys.KeyW || state.keys.ArrowUp){
    dy -= 1;
  }
  if(state.keys.KeyS || state.keys.ArrowDown){
    dy += 1;
  }

  if(state.joystick.active){
    dx += state.joystick.x;
    dy += state.joystick.y;
  }

  const length = Math.hypot(dx, dy);
  if(length > 0){
    dx /= length;
    dy /= length;
  }

  const player = state.player;
  const isInCorridor = !getCurrentRoom();
  const speed = isInCorridor ? PLAYER_SPEED_CORRIDOR : PLAYER_SPEED_ROOM;
  const moveX = dx * speed * dt;
  const moveY = dy * speed * dt;

  if(length > 0){
    player.moving = true;
    player.walkTime += dt * 10;
    if(Math.abs(dx) > Math.abs(dy)){
      player.dir = dx > 0 ? "right" : "left";
    } else if(Math.abs(dy) > 0){
      player.dir = dy > 0 ? "down" : "up";
    }
  } else {
    player.moving = false;
  }

  player.x = moveAxis(player.x, moveX, "x");
  player.y = moveAxis(player.y, moveY, "y");
}

function moveAxis(current, delta, axis){
  if(delta === 0){
    return current;
  }
  let next = current + delta;
  const playerBox = getPlayerBox(
    axis === "x" ? next : state.player.x,
    axis === "y" ? next : state.player.y
  );

  world.obstacles.forEach((obstacle) => {
    if(!rectsIntersect(playerBox, obstacle)){
      return;
    }
    if(axis === "x"){
      if(delta > 0){
        next = obstacle.x - state.player.w * 0.5;
      } else {
        next = obstacle.x + obstacle.w + state.player.w * 0.5;
      }
      playerBox.x = next - state.player.w * 0.5;
    } else {
      if(delta > 0){
        next = obstacle.y - 2;
      } else {
        next = obstacle.y + obstacle.h + state.player.h;
      }
      playerBox.y = next - state.player.h;
    }
  });

  return next;
}

function getPlayerBox(x, y){
  return {
    x: x - state.player.w * 0.5,
    y: y - state.player.h,
    w: state.player.w,
    h: state.player.h
  };
}

function rectsIntersect(a, b){
  return a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y;
}

function getCurrentRoom(){
  const player = state.player;
  return world.rooms.find((room) =>
    player.x > room.interior.x &&
    player.x < room.interior.x + room.interior.w &&
    player.y > room.y + 30 &&
    player.y < room.y + room.h - 8
  ) || null;
}

function findNearestStudent(){
  if(state.dialogue){
    return state.dialogue.student;
  }
  let best = null;
  let bestDistance = INTERACTION_RADIUS;
  world.students.forEach((student) => {
    const distance = Math.hypot(student.x - state.player.x, student.y - state.player.y);
    if(distance < bestDistance){
      best = student;
      bestDistance = distance;
    }
  });
  return best;
}

function updateFacing(){
  world.students.forEach((student) => {
    student.dir = "down";
  });

  if(state.dialogue){
    const student = state.dialogue.student;
    const dx = state.player.x - student.x;
    const dy = state.player.y - student.y;
    if(Math.abs(dx) > Math.abs(dy)){
      student.dir = dx > 0 ? "right" : "left";
    } else {
      student.dir = dy > 0 ? "down" : "up";
    }
  }
}

function handleInteraction(){
  if(state.dialogue){
    closeDialogue();
    return;
  }
  if(!state.nearStudent){
    return;
  }
  openDialogue(state.nearStudent);
}

function openDialogue(student){
  const count = state.talkCounts[student.id] || 0;
  const dialogueSet = student.dialogues || {};
  const fallbackText = "......";
  const firstText = pickDialogueText(dialogueSet.first, fallbackText);
  const visitedText = pickDialogueText(dialogueSet.visited, firstText);
  const repeatText = pickDialogueText(dialogueSet.repeat, visitedText);
  let text = repeatText;
  if(count === 0){
    text = firstText;
  } else if(count === 1){
    text = visitedText;
  }
  state.talkCounts[student.id] = count + 1;
  state.dialogue = { student, text };

  dialogueAvatar.textContent = student.avatar;
  dialogueName.textContent = student.shortName || student.name;
  dialogueClass.textContent = student.detailLine || student.roomName;
  dialogueText.textContent = text;
  dialoguePanel.hidden = false;
  setDialogueUiState(true);
}

function closeDialogue(){
  state.dialogue = null;
  dialoguePanel.hidden = true;
  setDialogueUiState(false);
}

function setDialogueUiState(isOpen){
  document.documentElement.classList.toggle("dialogue-open", isOpen);
}

function switchFloor(nextFloor){
  if(nextFloor === state.currentFloor || nextFloor < 1 || nextFloor > 3){
    return;
  }
  closeDialogue();
  state.currentFloor = nextFloor;
  world = buildWorld(SCHOOL_DATA, state.currentFloor);
  baseCanvas = createBaseWorld(world);
  state.player.x = world.spawn.x;
  state.player.y = world.spawn.y;
  state.currentRoom = null;
  state.nearStudent = null;
  state.camera.x = 0;
  state.camera.y = 0;
  updateFloorTabs();
  updateCamera(true);
  updateHud();
}

function updateFloorTabs(){
  floorTabs.forEach((button) => {
    button.classList.toggle("active", Number(button.dataset.floor) === state.currentFloor);
  });
}

function updateCamera(forceSnap){
  const targetX = clamp(state.player.x - state.viewport.width * 0.5, 0, Math.max(world.width - state.viewport.width, 0));
  const targetY = clamp(state.player.y - state.viewport.height * 0.5, 0, Math.max(world.height - state.viewport.height, 0));

  if(forceSnap){
    state.camera.x = targetX;
    state.camera.y = targetY;
    return;
  }

  state.camera.x += (targetX - state.camera.x) * CAMERA_LERP;
  state.camera.y += (targetY - state.camera.y) * CAMERA_LERP;
}

function updateHud(){
  const placeName = state.currentRoom ? state.currentRoom.name : state.currentFloor + "층 복도";
  locationBadge.textContent = "설내고등학교 " + placeName;

  if(state.dialogue){
    promptEl.style.display = "none";
  } else if(state.nearStudent){
    const actionKey = state.isTouchUI ? "대화 버튼" : "E";
    promptEl.textContent = (state.nearStudent.shortName || state.nearStudent.name) + "에게 말 걸기 (" + actionKey + ")";
    promptEl.style.display = "block";
  } else {
    promptEl.style.display = "none";
  }
}

function render(){
  ctx.clearRect(0, 0, state.viewport.width, state.viewport.height);
  ctx.drawImage(
    baseCanvas,
    Math.round(state.camera.x),
    Math.round(state.camera.y),
    state.viewport.width,
    state.viewport.height,
    0,
    0,
    state.viewport.width,
    state.viewport.height
  );

  const drawables = [];
  world.props.forEach((prop) => {
    if(isVisible(prop.x, prop.y, prop.w || 80, prop.h || 32)){
      drawables.push({ type: "prop", sortY: prop.sortY || prop.y + (prop.h || 0), data: prop });
    }
  });
  world.students.forEach((student) => {
    if(isVisible(student.x - 24, student.y - 46, 48, 54)){
      drawables.push({ type: "student", sortY: student.y, data: student });
    }
  });
  drawables.push({ type: "player", sortY: state.player.y, data: state.player });

  drawables.sort((a, b) => a.sortY - b.sortY);
  drawables.forEach((item) => {
    if(item.type === "prop"){
      drawProp(item.data);
    } else if(item.type === "student"){
      drawStudent(item.data);
    } else {
      drawPlayer(item.data);
    }
  });

  drawInteractionIndicator();
}

function isVisible(x, y, w, h){
  const screenX = x - state.camera.x;
  const screenY = y - state.camera.y;
  return screenX < state.viewport.width + 64 &&
    screenY < state.viewport.height + 64 &&
    screenX + w > -64 &&
    screenY + h > -64;
}

function drawProp(prop){
  const x = Math.round(prop.x - state.camera.x);
  const y = Math.round(prop.y - state.camera.y);

  switch(prop.type){
    case "desk":
      drawDesk(ctx, x, y, prop.w, prop.h);
      break;
    case "chair":
      drawChair(ctx, x, y, prop.w, prop.h);
      break;
    case "teacherDesk":
      drawTeacherDesk(ctx, x, y, prop.w, prop.h);
      break;
    case "bookshelf":
      drawBookshelf(ctx, x, y, prop.w, prop.h);
      break;
    case "locker":
      drawLocker(ctx, x, y, prop.w, prop.h);
      break;
    case "blackboard":
      drawBlackboard(ctx, x, y, prop.w, prop.h);
      break;
    case "window":
      drawWindow(ctx, x, y, prop.w, prop.h);
      break;
    case "notebook":
      drawNotebook(ctx, x, y, prop.w, prop.h);
      break;
    case "sign":
      drawHallSign(ctx, x, y, prop.text, prop.color);
      break;
    case "extinguisher":
      drawExtinguisher(ctx, x, y);
      break;
    default:
      break;
  }
}

function drawDesk(target, x, y, w, h){
  target.fillStyle = COLORS.deskTop;
  target.fillRect(x, y + 2, w, h - 10);
  target.fillStyle = "#e2bb8d";
  target.fillRect(x + 4, y + 5, w - 8, 6);
  target.fillStyle = COLORS.deskSide;
  target.fillRect(x, y + h - 12, w, 8);
  target.fillStyle = COLORS.deskLeg;
  target.fillRect(x + 4, y + h - 4, 5, 10);
  target.fillRect(x + w - 9, y + h - 4, 5, 10);
}

function drawChair(target, x, y, w, h){
  target.fillStyle = COLORS.chair;
  target.fillRect(x + 4, y + 3, w - 8, 8);
  target.fillRect(x + 7, y + 10, w - 14, 8);
  target.fillStyle = COLORS.chairDark;
  target.fillRect(x + 6, y + 15, 4, h - 8);
  target.fillRect(x + w - 10, y + 15, 4, h - 8);
}

function drawTeacherDesk(target, x, y, w, h){
  target.fillStyle = "#c39866";
  target.fillRect(x, y + 2, w, h - 8);
  target.fillStyle = "#e1bf94";
  target.fillRect(x + 4, y + 6, w - 8, 6);
  target.fillStyle = "#8f663c";
  target.fillRect(x, y + h - 10, w, 8);
  target.fillRect(x + 6, y + 12, 16, 14);
  target.fillRect(x + w - 22, y + 12, 16, 14);
}

function drawBookshelf(target, x, y, w, h){
  target.fillStyle = COLORS.shelf;
  target.fillRect(x, y, w, h);
  target.fillStyle = "#6e4d29";
  target.fillRect(x + 3, y + 3, w - 6, h - 6);
  for(let i = 1; i < 4; i += 1){
    target.fillStyle = "#a88455";
    target.fillRect(x + 4, y + i * 24, w - 8, 3);
  }
  const bookColors = ["#4f7ac8", "#cc6b4b", "#5ea86f", "#d0ab46", "#8f63c5"];
  for(let shelf = 0; shelf < 4; shelf += 1){
    for(let book = 0; book < 4; book += 1){
      target.fillStyle = bookColors[(shelf + book) % bookColors.length];
      target.fillRect(x + 7 + book * 7, y + 8 + shelf * 24, 5, 14);
    }
  }
}

function drawLocker(target, x, y, w, h){
  target.fillStyle = COLORS.locker;
  target.fillRect(x, y, w, h);
  target.fillStyle = COLORS.lockerDark;
  target.fillRect(x, y, w, 3);
  target.fillRect(x, y + h - 3, w, 3);
  target.fillRect(x, y, 3, h);
  target.fillRect(x + w - 3, y, 3, h);
  target.fillStyle = COLORS.lockerLight;
  target.fillRect(x + 4, y + 5, w - 8, h - 10);
  target.fillStyle = "#33506d";
  target.fillRect(x + w * 0.5 - 2, y + 16, 4, 8);
}

function drawBlackboard(target, x, y, w, h){
  target.fillStyle = COLORS.blackboardFrame;
  target.fillRect(x, y, w, h);
  target.fillStyle = COLORS.blackboard;
  target.fillRect(x + 4, y + 4, w - 8, h - 11);
  target.fillStyle = "#d9e5ce";
  target.font = "bold 9px Consolas, monospace";
  target.fillText("1 + 1 = 2", x + 12, y + 17);
  target.fillText("ABC", x + 62, y + 28);
  target.fillStyle = "#d6c6a1";
  target.fillRect(x + 6, y + h - 7, w - 12, 3);
}

function drawWindow(target, x, y, w, h){
  target.fillStyle = "#75553d";
  target.fillRect(x, y, w, h);
  target.fillStyle = COLORS.windowGlass;
  target.fillRect(x + 5, y + 4, w - 10, h - 10);
  target.fillStyle = "#75553d";
  target.fillRect(x + w * 0.5 - 2, y + 4, 4, h - 10);
  target.fillRect(x + 5, y + h * 0.5 - 2, w - 10, 4);
  target.fillStyle = COLORS.curtainA;
  target.fillRect(x - 1, y - 1, 10, h + 2);
  target.fillRect(x + w - 9, y - 1, 10, h + 2);
  target.fillStyle = COLORS.curtainB;
  target.fillRect(x + 7, y - 1, 2, h + 2);
  target.fillRect(x + w - 9, y - 1, 2, h + 2);
}

function drawNotebook(target, x, y, w, h){
  target.fillStyle = "#ffffff";
  target.fillRect(x, y, w, h);
  target.fillStyle = "#a4b9d8";
  target.fillRect(x + 2, y + 2, w - 4, 2);
  target.fillRect(x + 3, y + 6, w - 6, 1);
}

function drawHallSign(target, x, y, text, color){
  target.fillStyle = "#15304f";
  target.fillRect(x, y, 108, 18);
  target.fillStyle = color;
  target.fillRect(x + 4, y + 4, 100, 10);
  target.fillStyle = "#17324a";
  target.font = "bold 11px Consolas, Malgun Gothic, sans-serif";
  target.textAlign = "center";
  target.textBaseline = "middle";
  target.fillText(text, x + 54, y + 9);
}

function drawExtinguisher(target, x, y){
  target.fillStyle = "#c23737";
  target.fillRect(x + 4, y + 5, 10, 24);
  target.fillRect(x + 2, y + 2, 14, 5);
  target.fillStyle = "#f6d9d9";
  target.fillRect(x + 6, y + 12, 6, 5);
  target.fillStyle = "#777777";
  target.fillRect(x + 12, y + 2, 6, 3);
  target.fillRect(x + 14, y + 1, 2, 8);
}

function drawStudent(student){
  const bob = Math.sin(state.time * 2.5 + student.bobOffset) * 1.2;
  drawCharacter(student.x, student.y + bob, student.dir, false, student.palette);
  drawNameplate(student);
}

function drawPlayer(player){
  const bob = player.moving ? Math.sin(player.walkTime * 7) * 1.5 : 0;
  drawCharacter(player.x, player.y + bob, player.dir, true, playerPalette());
}

function drawCharacter(worldX, worldY, direction, isPlayer, palette){
  const x = Math.round(worldX - state.camera.x);
  const y = Math.round(worldY - state.camera.y);
  const px = 2;

  ctx.save();
  ctx.translate(x, y);

  ctx.fillStyle = "rgba(0,0,0,0.16)";
  ctx.beginPath();
  ctx.ellipse(0, 2, 12, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();

  const legSwing = isPlayer && state.player.moving ? (Math.floor(state.player.walkTime * 8) % 2 === 0 ? -1 : 1) : 0;
  const eyeOffsetX = direction === "left" ? -1 : direction === "right" ? 1 : 0;
  const faceYOffset = direction === "up" ? -1 : 0;
  const gender = palette.gender || "";
  const isFemale = gender === "여자";
  const isNeutral = gender === "중성";

  fillPx(-3 + legSwing, -2, 2, 3, palette.pants, px);
  fillPx(1 - legSwing, -2, 2, 3, palette.pants, px);
  fillPx(-4, -1, 3, 1, palette.shoe, px);
  fillPx(1, -1, 3, 1, palette.shoe, px);

  if(isFemale){
    fillPx(-4, -7, 8, 4, palette.outfit, px);
    fillPx(-5, -13, 10, 6, palette.outfitLight, px);
    fillPx(-3, -3, 6, 2, palette.outfit, px);
    fillPx(-6, -10, 2, 3, palette.outfit, px);
    fillPx(4, -10, 2, 3, palette.outfit, px);
  } else {
    fillPx(-5, -8, 10, 6, palette.outfit, px);
    fillPx(-6, -13, 12, 6, palette.outfitLight, px);
    fillPx(-6, -10, 2, 3, palette.outfit, px);
    fillPx(4, -10, 2, 3, palette.outfit, px);
  }

  if(direction === "left"){
    fillPx(-5, -18, 2, 3, palette.skin, px);
    fillPx(-3, -18, 6, 5, palette.skin, px);
  } else if(direction === "right"){
    fillPx(3, -18, 2, 3, palette.skin, px);
    fillPx(-3, -18, 6, 5, palette.skin, px);
  } else {
    fillPx(-4, -18, 8, 6, palette.skin, px);
  }

  if(!isPlayer){
    if(isFemale){
      fillPx(-6, -21, 2, 10, palette.hair, px);
      fillPx(4, -21, 2, 10, palette.hair, px);
      fillPx(-4, -22, 8, 3, palette.hair, px);
      fillPx(-3, -12, 2, 3, palette.hair, px);
      fillPx(1, -12, 2, 3, palette.hair, px);
    } else if(isNeutral){
      fillPx(-5, -22, 10, 3, palette.hair, px);
      fillPx(-5, -19, 2, 4, palette.hair, px);
      fillPx(3, -19, 2, 4, palette.hair, px);
    } else {
      fillPx(-5, -22, 10, 4, palette.hair, px);
      fillPx(-4, -18, 8, 2, palette.hair, px);
    }
  }

  if(isPlayer){
    fillPx(-5, -23, 10, 5, palette.hair, px);
  } else if(isFemale){
    fillPx(-6, -18, 2, 4, palette.hair, px);
    fillPx(4, -18, 2, 4, palette.hair, px);
  } else if(!isNeutral){
    fillPx(-4, -18, 8, 1, palette.hair, px);
  }

  fillPx(-2 + eyeOffsetX, -16 + faceYOffset, 1, 1, palette.eye, px);
  fillPx(1 + eyeOffsetX, -16 + faceYOffset, 1, 1, palette.eye, px);

  ctx.restore();

  function fillPx(pxX, pxY, w, h, color, scale){
    ctx.fillStyle = color;
    ctx.fillRect(pxX * scale, pxY * scale, w * scale, h * scale);
  }
}

function drawNameplate(student){
  const x = Math.round(student.x - state.camera.x);
  const y = Math.round(student.y - state.camera.y);
  const label = student.shortName || student.name;
  ctx.font = "11px Consolas, Malgun Gothic, sans-serif";
  const width = Math.ceil(ctx.measureText(label).width + 12);
  ctx.fillStyle = "rgba(8,17,29,0.74)";
  ctx.fillRect(x - width / 2, y - 60, width, 16);
  ctx.fillStyle = "#edf6ff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(label, x, y - 52);
}

function drawInteractionIndicator(){
  if(!state.nearStudent || state.dialogue){
    return;
  }
  const x = Math.round(state.nearStudent.x - state.camera.x);
  const y = Math.round(state.nearStudent.y - state.camera.y - 62 + Math.sin(state.time * 5) * 3);
  ctx.fillStyle = "#f8fbff";
  ctx.fillRect(x - 10, y - 10, 20, 20);
  ctx.fillStyle = "#2f73ff";
  ctx.fillRect(x - 6, y - 6, 12, 12);
}

function npcPaletteFor(seed, index){
  const variants = [
    { hat: "#4d3625", outfit: "#dd8b5e", outfitLight: "#f0a87e", pants: "#87573e", skin: "#f4c498", eye: "#1d120d", shoe: "#33221a", emblem: "#f6df9c", hair: "#3a2416" },
    { hat: "#3a4c6c", outfit: "#5d97d6", outfitLight: "#8cb7ef", pants: "#3d6897", skin: "#efd2b6", eye: "#182437", shoe: "#1b2430", emblem: "#d7efff", hair: "#273549" },
    { hat: "#345039", outfit: "#62b672", outfitLight: "#90d39c", pants: "#3c7e49", skin: "#f3ca9c", eye: "#15240f", shoe: "#1d2618", emblem: "#eefad6", hair: "#2a3f2f" },
    { hat: "#563b62", outfit: "#b37adf", outfitLight: "#d1a4f0", pants: "#75439f", skin: "#f2caa6", eye: "#21142b", shoe: "#2b1d34", emblem: "#f5d6ff", hair: "#47304f" },
    { hat: "#525252", outfit: "#d5a34c", outfitLight: "#f0c772", pants: "#a27734", skin: "#f2c8a3", eye: "#1f1f1f", shoe: "#322815", emblem: "#f9f1c2", hair: "#3a3a3a" }
  ];
  const hash = Math.abs(hashString(seed + index));
  return variants[hash % variants.length];
}

function playerPalette(){
  return {
    hat: "#10131b",
    outfit: "#3569ff",
    outfitLight: "#4a88ff",
    pants: "#2c56c7",
    skin: "#fff5e1",
    eye: "#111111",
    shoe: "#24150a",
    emblem: "#52a3ff",
    hair: "#10131b",
    gender: ""
  };
}

function yearColor(year){
  if(year === 1){
    return COLORS.year1;
  }
  if(year === 2){
    return COLORS.year2;
  }
  return COLORS.year3;
}

function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

function pickDialogueText(value, fallback){
  if(typeof value === "string" && value.trim()){
    return value;
  }
  if(Array.isArray(value)){
    const firstFilled = value.find((item) => typeof item === "string" && item.trim());
    if(firstFilled){
      return firstFilled;
    }
  }
  return fallback;
}

function hashString(text){
  let hash = 0;
  for(let i = 0; i < text.length; i += 1){
    hash = (hash << 5) - hash + text.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}
